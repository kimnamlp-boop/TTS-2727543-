<script>
// ============================================================
//  STATE
// ============================================================
let db, synth = window.speechSynthesis;
let chapters = [], currentSentences = [];
let curChapIdx = 0, curSentIdx = 0;
let isReading = false, curBookName = "", curBookType = "txt";
let sleepTimerInterval = null, sleepEndTime = 0;
let isCompact = true;
let lastLoadedFile = null; // File object cho nút upload

const silentAudio    = document.getElementById('silentAudio');
const displayBox     = document.getElementById('displayBox');
const chapterSelect  = document.getElementById('chapterSelect');
const rateInput      = document.getElementById('rate');
const timerDisplay   = document.getElementById('timerDisplay');
const timerCountdown = document.getElementById('timerCountdown');
const prevChapBtn    = document.getElementById('prevChap');
const nextChapBtn    = document.getElementById('nextChap');
const btnCompact     = document.getElementById('btnCompact');
const btnFull        = document.getElementById('btnFull');
const uploadGhBtn    = document.getElementById('uploadGhBtn');

// ============================================================
//  DATABASE (IndexedDB)
// ============================================================
const dbReq = indexedDB.open("ProReaderDB", 3);
dbReq.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains("books")) d.createObjectStore("books", { keyPath: "name" });
};
dbReq.onsuccess = e => { db = e.target.result; refreshLib(); loadGhConfig(); };

// ============================================================
//  GITHUB CONFIG
// ============================================================
function saveGhConfig() {
    const cfg = {
        token:  document.getElementById('ghToken').value.trim(),
        repo:   document.getElementById('ghRepo').value.trim(),
        branch: document.getElementById('ghBranch').value.trim() || 'main',
        folder: document.getElementById('ghFolder').value.trim() || 'books'
    };
    localStorage.setItem('ghConfig', JSON.stringify(cfg));
    setGhStatus(cfg.token && cfg.repo ? '✅ Đã lưu — sẵn sàng upload' : '⚠️ Cần điền Token và Repo', cfg.token && cfg.repo ? 'ok' : 'err');
    uploadGhBtn.disabled = !(cfg.token && cfg.repo);
    document.getElementById('ghDetails').open = false;
}

function loadGhConfig() {
    const cfg = getGhConfig();
    if (!cfg) return;
    document.getElementById('ghToken').value  = cfg.token  || '';
    document.getElementById('ghRepo').value   = cfg.repo   || '';
    document.getElementById('ghBranch').value = cfg.branch || 'main';
    document.getElementById('ghFolder').value = cfg.folder || 'books';
    if (cfg.token && cfg.repo) {
        uploadGhBtn.disabled = false;
        setGhStatus('✅ Đã cài đặt GitHub', 'ok');
    }
}

function getGhConfig() {
    try { return JSON.parse(localStorage.getItem('ghConfig')) || null; } catch { return null; }
}

function setGhStatus(msg, type = '') {
    const el = document.getElementById('ghStatus');
    el.textContent = msg; el.className = 'gh-status ' + type;
}

// ============================================================
//  UPLOAD LÊN GITHUB
// ============================================================
async function uploadToGithub() {
    const cfg = getGhConfig();
    if (!cfg || !cfg.token || !cfg.repo) {
        document.getElementById('ghDetails').open = true;
        return setGhStatus('⚠️ Chưa cài đặt GitHub Token và Repo', 'err');
    }
    if (!lastLoadedFile) return setGhStatus('⚠️ Chưa chọn file', 'err');

    document.getElementById('ghDetails').open = true;
    setGhStatus('⏳ Đang upload...', '');
    uploadGhBtn.disabled = true;

    try {
        const arrayBuf = await lastLoadedFile.arrayBuffer();
        const b64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuf)));
        const path = `${cfg.folder}/${lastLoadedFile.name}`;
        const url  = `https://api.github.com/repos/${cfg.repo}/contents/${path}`;

        // Kiểm tra file đã tồn tại chưa (để lấy sha)
        let sha = '';
        try {
            const check = await fetch(url, { headers: { Authorization: `token ${cfg.token}`, Accept: 'application/vnd.github.v3+json' } });
            if (check.ok) { const j = await check.json(); sha = j.sha; }
        } catch {}

        const body = { message: `Upload ${lastLoadedFile.name}`, content: b64, branch: cfg.branch };
        if (sha) body.sha = sha;

        const res = await fetch(url, {
            method: 'PUT',
            headers: { Authorization: `token ${cfg.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            const j = await res.json();
            // Lưu URL raw vào metadata sách
            await saveBookMeta(lastLoadedFile.name, j.content.download_url);
            setGhStatus(`✅ Upload thành công! Đã lưu trên GitHub.`, 'ok');
            refreshLib();
        } else {
            const err = await res.json();
            setGhStatus(`❌ Lỗi: ${err.message}`, 'err');
        }
    } catch (e) {
        setGhStatus(`❌ ${e.message}`, 'err');
    }
    uploadGhBtn.disabled = false;
}

async function saveBookMeta(name, ghUrl) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(["books"], "readwrite");
        tx.objectStore("books").get(name).onsuccess = e => {
            const book = e.target.result || { name };
            book.ghUrl = ghUrl;
            tx.objectStore("books").put(book).onsuccess = resolve;
        };
        tx.onerror = reject;
    });
}

// ============================================================
//  FILE INPUT — TXT & EPUB
// ============================================================
document.getElementById('fileInput').onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    lastLoadedFile = file;
    uploadGhBtn.disabled = !getGhConfig()?.token;

    if (file.name.toLowerCase().endsWith('.epub')) {
        await loadEpubFile(file);
    } else {
        loadTxtFile(file);
    }
};

function loadTxtFile(file) {
    const reader = new FileReader();
    reader.onload = ev => {
        const tx = db.transaction(["books"], "readwrite");
        tx.objectStore("books").put({ name: file.name, data: ev.target.result, type: 'txt' });
        tx.oncomplete = () => { loadBook(file.name); refreshLib(); };
    };
    reader.readAsText(file);
}

async function loadEpubFile(file) {
    displayBox.innerHTML = '<div class="loading">⏳ Đang đọc EPUB...</div>';
    try {
        const zip = await JSZip.loadAsync(file);

        // 1. Đọc container.xml → tìm OPF path
        const containerXml = await zip.file('META-INF/container.xml').async('string');
        const parser = new DOMParser();
        const containerDoc = parser.parseFromString(containerXml, 'application/xml');
        const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
        const opfDir  = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

        // 2. Đọc OPF → spine + manifest
        const opfXml = await zip.file(opfPath).async('string');
        const opfDoc = parser.parseFromString(opfXml, 'application/xml');

        const manifest = {};
        opfDoc.querySelectorAll('manifest item').forEach(item => {
            manifest[item.getAttribute('id')] = {
                href: item.getAttribute('href'),
                type: item.getAttribute('media-type')
            };
        });

        // 3. Lấy thứ tự spine
        const spineItems = [...opfDoc.querySelectorAll('spine itemref')].map(r => r.getAttribute('idref'));

        // 4. Đọc từng chapter HTML
        const chaptersData = [];
        for (const id of spineItems) {
            const item = manifest[id];
            if (!item) continue;
            const href = opfDir + item.href;
            const hfile = zip.file(href) || zip.file(item.href);
            if (!hfile) continue;
            const html = await hfile.async('string');
            const doc  = parser.parseFromString(html, 'text/html');
            // Lấy tiêu đề chapter từ h1/h2/title
            const title = doc.querySelector('h1,h2,h3')?.textContent?.trim()
                       || doc.title?.trim()
                       || `Phần ${chaptersData.length + 1}`;
            // Lấy text thuần
            const body = doc.body?.innerText || doc.body?.textContent || '';
            if (body.trim().length > 20) chaptersData.push({ title, text: body });
        }

        if (chaptersData.length === 0) throw new Error('Không đọc được nội dung EPUB');

        // Ghép thành 1 chuỗi có header chương để parse giống TXT
        const combined = chaptersData.map((c, i) => `Chương ${i + 1} ${c.title}\n${c.text}`).join('\n\n');

        const tx = db.transaction(["books"], "readwrite");
        tx.objectStore("books").put({ name: file.name, data: combined, type: 'epub' });
        tx.oncomplete = () => { loadBook(file.name); refreshLib(); };

    } catch (err) {
        displayBox.innerHTML = `<div style="color:red;padding:10px;">❌ Lỗi đọc EPUB: ${err.message}</div>`;
    }
}

// ============================================================
//  THƯ VIỆN
// ============================================================
function refreshLib() {
    const list = document.getElementById('bookList'); list.innerHTML = '';
    if (!db) return;
    db.transaction(["books"], "readonly").objectStore("books").getAll().onsuccess = e => {
        e.target.result.forEach(book => {
            const isActive = book.name === curBookName;
            const typeLabel = book.type === 'epub' ? 'EPUB' : 'TXT';
            const typeCls   = book.type === 'epub' ? 'badge-epub' : 'badge-txt';
            const ghBadge   = book.ghUrl ? `<span class="book-badge badge-gh">☁</span>` : '';
            const item = document.createElement('div');
            item.className = `book-item ${isActive ? 'active' : ''}`;
            item.innerHTML = `
                <span onclick="loadBook('${book.name}')" style="flex:1; cursor:pointer;">
                    ${book.name}
                    <span class="book-badge ${typeCls}">${typeLabel}</span>${ghBadge}
                </span>
                <span class="delete-btn" onclick="deleteBook('${book.name}')">Xóa</span>`;
            list.appendChild(item);
        });
    };
}

function deleteBook(name) {
    if (confirm('Xóa truyện này khỏi thư viện?')) {
        db.transaction(['books'], 'readwrite').objectStore('books').delete(name).onsuccess = () => {
            if (curBookName === name) { curBookName = ''; displayBox.innerText = 'Đã xóa.'; }
            refreshLib();
        };
    }
}

// ============================================================
//  TẢI SÁCH & CHƯƠNG
// ============================================================
function loadBook(name) {
    curBookName = name;
    db.transaction(['books'], 'readonly').objectStore('books').get(name).onsuccess = e => {
        const book = e.target.result;
        curBookType = book.type || 'txt';
        const text = book.data;

        const chapterRegex = /(^\s*(?:Chương|Quyển|Mục|Phần)\s*[\dIVX\-\.]+[^\n]*|^\s*\d+\.\s+[^\n]+)/gim;
        let match, lastIdx = 0;
        chapters = []; chapterSelect.innerHTML = '';

        while ((match = chapterRegex.exec(text)) !== null) {
            if (match.index > 0) chapters.push(text.substring(lastIdx, match.index));
            const opt = document.createElement('option');
            opt.value = chapters.length;
            opt.innerText = match[0].trim().substring(0, 45);
            chapterSelect.appendChild(opt);
            lastIdx = match.index;
        }
        chapters.push(text.substring(lastIdx));
        if (chapters.length === 1) { chapterSelect.innerHTML = "<option value='0'>Nội dung chính</option>"; }

        const saved = localStorage.getItem('pos_' + name) || '0_0';
        curChapIdx = parseInt(saved.split('_')[0]);
        curSentIdx = parseInt(saved.split('_')[1]);
        chapterSelect.value = curChapIdx;
        loadChapter(curChapIdx, true);
        refreshLib();
    };
}

function loadChapter(idx, useSavedSent = false) {
    pauseReading();
    curChapIdx = idx;
    if (!useSavedSent) curSentIdx = 0;
    chapterSelect.value = idx;
    const text = chapters[idx];
    currentSentences = text.match(/[^.!?\n]+[.!?\n]?/g) || [text];
    currentSentences = currentSentences.map(s => s.trim()).filter(s => s.length > 0);
    updateChapButtons();
    renderText();
}

function updateChapButtons() {
    prevChapBtn.disabled = curChapIdx <= 0;
    nextChapBtn.disabled = curChapIdx >= chapters.length - 1;
}

// ============================================================
//  RENDER & VIEW MODE
// ============================================================
function renderText() {
    displayBox.innerHTML = '';
    currentSentences.forEach((s, i) => {
        const span = document.createElement('span');
        span.id = `s-${i}`;
        span.className = 'sentence' + (i === curSentIdx ? ' highlight' : '');
        span.innerText = s + ' ';
        span.onclick = () => { curSentIdx = i; isReading = true; speak(); };
        displayBox.appendChild(span);
    });
    applyViewMode();
    scrollToSentence();
}

function applyViewMode() {
    if (isCompact) {
        displayBox.classList.replace('full', 'compact') || displayBox.classList.add('compact');
        btnCompact.classList.add('active'); btnFull.classList.remove('active');
    } else {
        displayBox.classList.replace('compact', 'full') || displayBox.classList.add('full');
        btnFull.classList.add('active'); btnCompact.classList.remove('active');
    }
}

btnCompact.onclick = () => { isCompact = true;  applyViewMode(); };
btnFull.onclick    = () => { isCompact = false; applyViewMode(); scrollToSentence(); };

// ============================================================
//  TTS
// ============================================================
function speak() {
    if (curSentIdx >= currentSentences.length) {
        if (curChapIdx < chapters.length - 1) {
            curChapIdx++; loadChapter(curChapIdx); isReading = true; speak();
        }
        return;
    }
    if (!isReading) return;

    synth.cancel();
    const utter = new SpeechSynthesisUtterance(currentSentences[curSentIdx]);
    utter.lang = 'vi-VN';
    utter.rate = parseFloat(rateInput.value);

    utter.onstart = () => {
        document.querySelectorAll('.sentence').forEach(el => el.classList.remove('highlight'));
        document.getElementById(`s-${curSentIdx}`)?.classList.add('highlight');
        scrollToSentence();
        localStorage.setItem('pos_' + curBookName, `${curChapIdx}_${curSentIdx}`);
        updateMediaSession();
    };
    utter.onend = () => { if (isReading && sleepEndTime >= 0) { curSentIdx++; speak(); } };
    synth.speak(utter);
}

function scrollToSentence() {
    if (!isCompact) document.getElementById(`s-${curSentIdx}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateMediaSession() {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: curBookName, artist: `Chương ${curChapIdx + 1}`,
            artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3844/3844721.png', sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play',  () => { isReading = true; speak(); });
        navigator.mediaSession.setActionHandler('pause', pauseReading);
    }
}

function pauseReading() { isReading = false; synth.cancel(); silentAudio.pause(); }
function stopReading()  { pauseReading(); clearSleepTimer(); }

// ============================================================
//  SLEEP TIMER
// ============================================================
function startSleepTimer(minutes) {
    clearSleepTimer(); if (minutes <= 0) return;
    sleepEndTime = Date.now() + minutes * 60 * 1000;
    timerDisplay.classList.add('active');
    updateCountdownDisplay();
    sleepTimerInterval = setInterval(() => {
        const remaining = sleepEndTime - Date.now();
        if (remaining <= 0) {
            clearInterval(sleepTimerInterval); sleepTimerInterval = null;
            sleepEndTime = 0; timerDisplay.classList.remove('active'); timerCountdown.textContent = '--:--';
            isReading = false;
            synth.cancel(); silentAudio.pause(); silentAudio.currentTime = 0;
            setTimeout(() => synth.cancel(), 100);
            setTimeout(() => { synth.cancel(); silentAudio.pause(); }, 300);
            showTimerEndNotice();
        } else { updateCountdownDisplay(); }
    }, 500);
}

function updateCountdownDisplay() {
    const s = Math.ceil(Math.max(0, sleepEndTime - Date.now()) / 1000);
    timerCountdown.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function clearSleepTimer() {
    if (sleepTimerInterval) { clearInterval(sleepTimerInterval); sleepTimerInterval = null; }
    sleepEndTime = 0; timerDisplay.classList.remove('active'); timerCountdown.textContent = '--:--';
}

function showTimerEndNotice() {
    timerDisplay.classList.add('active'); timerCountdown.textContent = 'Hết giờ!';
    Object.assign(timerDisplay.style, { background:'#f8d7da', borderColor:'#f5c2c7', color:'#842029' });
    setTimeout(() => {
        timerDisplay.classList.remove('active');
        Object.assign(timerDisplay.style, { background:'', borderColor:'', color:'' });
    }, 4000);
}

// ============================================================
//  EVENT LISTENERS
// ============================================================
document.getElementById('playBtn').onclick = () => {
    if (!curBookName) return alert('Chọn truyện!');
    isReading = true; silentAudio.play();
    startSleepTimer(parseInt(document.getElementById('timer').value));
    speak();
};
document.getElementById('stopBtn').onclick  = stopReading;
document.getElementById('cancelTimer').onclick = () => { clearSleepTimer(); document.getElementById('timer').value = '0'; };
prevChapBtn.onclick    = () => { if (curChapIdx > 0) loadChapter(curChapIdx - 1); };
nextChapBtn.onclick    = () => { if (curChapIdx < chapters.length - 1) loadChapter(curChapIdx + 1); };
chapterSelect.onchange = e => loadChapter(parseInt(e.target.value));
rateInput.oninput      = e => document.getElementById('rateVal').innerText = e.target.value;
</script>
