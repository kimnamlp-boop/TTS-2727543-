<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Reader Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2 style="text-align:center">Trình Đọc Hẹn Giờ</h2>
    <input type="file" id="fileInput" accept=".txt">
    <select id="chapterSelect"><option>Chọn chương...</option></select>
    <div id="displayBox">Sẵn sàng...</div>

    <div class="control-group">
        <label>Chọn giọng đọc:</label>
        <select id="voiceSelect"><option>Đang tải danh sách giọng...</option></select>
        <label>Tốc độ: <span id="rateVal">1.0</span>x</label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
        <label>Hẹn giờ tắt:</label>
        <select id="timer">
            <option value="0">Tắt hẹn giờ</option>
            <option value="15">15 phút</option>
            <option value="30">30 phút</option>
            <option value="60">60 phút</option>
        </select>
        <div id="countdown" class="timer-display"></div>
    </div>

    <div class="buttons">
        <button class="btn-play" id="playBtn">PHÁT</button>
        <button class="btn-stop" id="stopBtn">DỪNG</button>
    </div>
    <div class="library-section" id="bookList"></div>
</div>

<audio id="silentAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>

<script src="script.js"></script>
</body>
</html>
