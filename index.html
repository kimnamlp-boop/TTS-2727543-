<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reader Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Web Audiobook Pro</h2>

    <input type="file" id="fileInput" accept=".txt">

    <select id="chapterSelect">
        <option>Chọn chương...</option>
    </select>

    <div id="displayBox">Chưa tải dữ liệu...</div>

    <div class="control">
        <label>Tốc độ: <span id="rateVal">1.0</span>x</label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

        <label>Hẹn giờ:</label>
        <select id="timer">
            <option value="0">Không hẹn giờ</option>
            <option value="15">15 phút</option>
            <option value="30">30 phút</option>
            <option value="60">60 phút</option>
        </select>

        <div id="countdown"></div>
    </div>

    <div class="buttons">
        <button id="playBtn" class="play">PHÁT</button>
        <button id="stopBtn" class="stop">DỪNG</button>
    </div>
</div>

<audio id="silentAudio" loop>
    <source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3">
</audio>

<script src="app.js"></script>
</body>
</html>
