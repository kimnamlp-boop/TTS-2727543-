<html lang="vi"><br>
<head><br>
    <meta charset="UTF-8"><br>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><br>
    <title>Web TTS Reader</title><br>
    <style><br>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; }<br>
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }<br>
        h2 { text-align: center; color: #333; }<br>
        textarea { width: 100%; height: 200px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; }<br>
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }<br>
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }<br>
        .btn-play { background: #007aff; color: white; }<br>
        .btn-stop { background: #ff3b30; color: white; }<br>
        .status { margin-top: 15px; font-size: 0.9em; color: #666; text-align: center; }<br>
    </style><br>
</head><br>
<body></p>

<div class="container">
    <h2>Trình Đọc Truyện Web</h2>
    <input type="file" id="fileInput" accept=".txt">
    <textarea id="textContent" placeholder="Nội dung sẽ hiển thị ở đây..."></textarea>
    
    <div class="controls">
        <button class="btn-play" onclick="startReading()">Đọc Tiếp</button>
        <button class="btn-stop" onclick="pauseReading()">Dừng</button>
    </div>
    
    <div class="status" id="status">Sẵn sàng.</div>
</div>

<script>
    let synth = window.speechSynthesis;
    let utterance = new SpeechSynthesisUtterance();
    let sentences = [];
    let currentIndex = 0;
    let isPaused = true;
    let currentFileName = "";

    // Đọc file từ thiết bị
    document.getElementById('fileInput').addEventListener('change', function(e) {
        let file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        let reader = new FileReader();
        reader.onload = function(e) {
            let text = e.target.result;
            document.getElementById('textContent').value = text;
            sentences = text.split(/[.!?\n]/).filter(s => s.trim().length > 0);
            
            // Tải tiến trình cũ
            currentIndex = parseInt(localStorage.getItem(currentFileName)) || 0;
            updateStatus();
        };
        reader.readAsText(file);
    });

    function updateStatus() {
        document.getElementById('status').innerText = `Đang ở câu: ${currentIndex} / ${sentences.length}`;
    }

    function startReading() {
        if (sentences.length === 0) return;
        isPaused = false;
        speakNext();
    }

    function speakNext() {
        if (currentIndex < sentences.length && !isPaused) {
            utterance = new SpeechSynthesisUtterance(sentences[currentIndex]);
            utterance.lang = 'vi-VN';
            utterance.rate = 1.0; // Tốc độ đọc

            utterance.onend = function() {
                currentIndex++;
                localStorage.setItem(currentFileName, currentIndex); // Lưu tiến trình
                updateStatus();
                speakNext();
            };

            synth.speak(utterance);
        }
    }

    function pauseReading() {
        isPaused = true;
        synth.cancel();
    }
</script>

<p></body><br>
</html></p>
