<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Pro Siri-like</title>

<style>
:root { --primary:#007aff; --bg:#f2f2f7; --card:#fff; }

body {
    font-family:-apple-system;
    background:var(--bg);
    padding:10px;
}

.container {
    max-width:520px;
    margin:auto;
    background:var(--card);
    padding:15px;
    border-radius:20px;
}

#displayBox {
    height:260px;
    overflow:auto;
    border:1px solid #ddd;
    border-radius:12px;
    padding:10px;
    font-size:17px;
    line-height:1.7;
}

.highlight { background:yellow; }

select,input[type=range]{
    width:100%;
    margin-bottom:10px;
    padding:10px;
}

button{
    width:100%;
    padding:14px;
    margin-top:5px;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

.play{background:#007aff;color:#fff;}
.stop{background:#ff3b30;color:#fff;}

.timer {text-align:center;color:red;font-size:13px;}
</style>
</head>

<body>

<div class="container">

<input type="file" id="fileInput" accept=".txt">

<select id="chapterSelect"></select>

<div id="displayBox">Sẵn sàng...</div>

<select id="voiceSelect"></select>

<label>Tốc độ: <span id="rateVal">1</span></label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>Pitch: <span id="pitchVal">1</span></label>
<input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">

<label>Volume: <span id="volVal">1</span></label>
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">

<select id="timer">
<option value="0">Không hẹn giờ</option>
<option value="15">15 phút</option>
<option value="30">30 phút</option>
<option value="60">60 phút</option>
</select>

<div class="timer" id="countdown"></div>

<button class="play" id="playBtn">PHÁT</button>
<button class="stop" id="stopBtn">DỪNG</button>

</div>

<audio id="silentAudio" loop>
<source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3">
</audio>

<script>

let synth = speechSynthesis;
let voices = [];

let chapters = [], sentences = [];
let chapIdx = 0, sentIdx = 0;

let reading = false;
let timerInt, timeLeft = 0;

const voiceSelect = document.getElementById("voiceSelect");
const silentAudio = document.getElementById("silentAudio");

// ===== LOAD VOICE =====
function loadVoices(){
    voices = synth.getVoices();

    let vi = voices.filter(v=>v.lang.includes("vi"));

    let fallback = voices.filter(v=>
        v.lang.includes("en-US") &&
        (v.name.toLowerCase().includes("siri") ||
         v.name.toLowerCase().includes("enhanced"))
    );

    let final = vi.length ? vi : fallback;

    final.sort((a,b)=>{
        const score=v=>
            (v.name.includes("Siri")?3:0)+
            (v.name.includes("Enhanced")?2:0);
        return score(b)-score(a);
    });

    voiceSelect.innerHTML = final.map(v=>
        `<option value="${v.name}">${v.name}</option>`
    ).join("");
}

speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

setTimeout(()=>{
    let best = voices.find(v=>v.name.includes("Siri")) || voices[0];
    if(best) voiceSelect.value = best.name;
},500);


// ===== FILE LOAD =====
document.getElementById("fileInput").onchange = e=>{
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = ev=>{
        let text = ev.target.result;

        chapters = text.split(/Chương\s+\d+/);
        if(chapters.length<=1) chapters=[text];

        let sel = document.getElementById("chapterSelect");
        sel.innerHTML = chapters.map((_,i)=>
            `<option value="${i}">Chương ${i+1}</option>`
        ).join("");

        loadChapter(0);
    };

    reader.readAsText(file);
};

function loadChapter(i){
    stop();
    chapIdx=i;
    sentIdx=0;

    sentences = chapters[i]
        .match(/[^.!?]+[.!?]?/g)
        .map(s=>s.trim());

    render();
}

document.getElementById("chapterSelect").onchange=e=>{
    loadChapter(parseInt(e.target.value));
};

// ===== RENDER =====
function render(){
    let box=document.getElementById("displayBox");
    box.innerHTML="";

    sentences.forEach((s,i)=>{
        let span=document.createElement("span");
        span.innerText=s+" ";
        if(i===sentIdx) span.classList.add("highlight");

        span.onclick=()=>{
            sentIdx=i;
            speak();
        };

        box.appendChild(span);
    });
}

// ===== SPEAK =====
function speak(){

    if(!reading) return;

    if(sentIdx>=sentences.length){
        stop();
        return;
    }

    synth.cancel();

    let u=new SpeechSynthesisUtterance(sentences[sentIdx]);

    u.voice = voices.find(v=>v.name===voiceSelect.value);

    u.rate = parseFloat(rate.value);
    u.pitch = parseFloat(pitch.value);
    u.volume = parseFloat(volume.value);

    u.onstart=()=>{
        render();
    };

    u.onend=()=>{
        sentIdx++;
        speak();
    };

    synth.speak(u);
}

// ===== TIMER =====
function startTimer(){
    clearInterval(timerInt);

    let m = parseInt(timer.value);
    if(!m) return;

    timeLeft = m*60;

    timerInt = setInterval(()=>{
        timeLeft--;

        let mm=Math.floor(timeLeft/60);
        let ss=timeLeft%60;

        countdown.innerText=`${mm}m ${ss}s`;

        if(timeLeft<=0){
            stop();
        }
    },1000);
}

// ===== CONTROL =====
playBtn.onclick=()=>{
    if(!sentences.length) return alert("Chọn file!");

    reading=true;
    silentAudio.play().catch(()=>{});

    startTimer();
    speak();
};

function stop(){
    reading=false;
    synth.cancel();
    silentAudio.pause();
    clearInterval(timerInt);
    countdown.innerText="";
}

stopBtn.onclick=stop;

// ===== UI =====
rate.oninput=e=>rateVal.innerText=e.target.value;
pitch.oninput=e=>pitchVal.innerText=e.target.value;
volume.oninput=e=>volVal.innerText=e.target.value;

// ===== iOS BACKGROUND FIX =====
document.addEventListener("visibilitychange",()=>{
    if(document.hidden && reading){
        silentAudio.play().catch(()=>{});
    }
});

</script>

</body>
</html>
