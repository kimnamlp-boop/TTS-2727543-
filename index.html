<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Reader Ultimate - Timer Fix</title>

<style>
:root { --primary:#007aff; --bg:#f2f2f7; --card:#fff; }

body {
    font-family:-apple-system;
    background:var(--bg);
    padding:15px;
}

.container {
    max-width:550px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:20px;
}

#displayBox {
    height:300px;
    overflow:auto;
    border:1px solid #ddd;
    border-radius:12px;
    padding:12px;
    font-size:18px;
    line-height:1.7;
}

.highlight { background:yellow; }

select,input[type=range]{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:14px;
    margin-top:5px;
    border:none;
    border-radius:12px;
    font-weight:bold;
}

.play{background:#007aff;color:#fff;}
.stop{background:#ff3b30;color:#fff;}

.timer{
    text-align:center;
    color:#ff3b30;
    font-weight:600;
    min-height:18px;
}
</style>
</head>

<body>

<div class="container">

<input type="file" id="fileInput" accept=".txt">

<select id="chapterSelect"></select>

<div id="displayBox">Sẵn sàng...</div>

<label>Tốc độ: <span id="rateVal">1</span></label>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">

<label>Hẹn giờ:</label>
<select id="timer">
<option value="0">Không hẹn giờ</option>
<option value="15">15 phút</option>
<option value="30">30 phút</option>
<option value="60">60 phút</option>
</select>

<div id="countdown" class="timer"></div>

<button class="play" id="playBtn">PHÁT</button>
<button class="stop" id="stopBtn">DỪNG</button>

</div>

<audio id="silentAudio" loop>
<source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3">
</audio>

<script>

let synth = speechSynthesis;
let chapters = [], sentences = [];
let chapIdx = 0, sentIdx = 0;
let reading = false;

let timerInterval = null;
let timeLeft = 0;

const countdown = document.getElementById("countdown");
const silentAudio = document.getElementById("silentAudio");

// ===== LOAD FILE =====
fileInput.onchange = e=>{
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = ev=>{
        let text = ev.target.result;

        chapters = text.split(/Chương\s+\d+/);
        if(chapters.length<=1) chapters=[text];

        chapterSelect.innerHTML = chapters.map((_,i)=>
            `<option value="${i}">Chương ${i+1}</option>`
        ).join("");

        loadChapter(0);
    };

    reader.readAsText(file);
};

function loadChapter(i){
    stopReading();
    chapIdx=i;
    sentIdx=0;

    sentences = chapters[i]
        .match(/[^.!?]+[.!?]?/g)
        .map(s=>s.trim());

    render();
}

chapterSelect.onchange=e=>{
    loadChapter(parseInt(e.target.value));
};

// ===== RENDER =====
function render(){
    let box=document.getElementById("displayBox");
    box.innerHTML="";

    sentences.forEach((s,i)=>{
        let span=document.createElement("span");
        span.innerText=s+" ";

        if(i===sentIdx) span.classList.add("highlight");

        span.onclick=()=>{
            sentIdx=i;
            speak();
        };

        box.appendChild(span);
    });
}

// ===== SPEAK =====
function speak(){

    if(!reading) return;

    if(sentIdx>=sentences.length){
        stopReading();
        return;
    }

    synth.cancel();

    let u=new SpeechSynthesisUtterance(sentences[sentIdx]);

    u.lang = "vi-VN";
    u.rate = parseFloat(rate.value);

    u.onstart=()=> render();

    u.onend=()=>{
        sentIdx++;
        speak();
    };

    synth.speak(u);
}

// ===== TIMER =====
function startTimer(){
    clearInterval(timerInterval);

    let mins = parseInt(timer.value);

    if(mins === 0){
        countdown.innerText="";
        return;
    }

    timeLeft = mins * 60;

    updateCountdown();

    timerInterval = setInterval(()=>{
        timeLeft--;

        updateCountdown();

        if(timeLeft <= 0){
            clearInterval(timerInterval);
            stopReading();
            countdown.innerText = "Đã hết thời gian!";
        }

    },1000);
}

function updateCountdown(){
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;

    countdown.innerText = `Sẽ tắt sau: ${m}ph ${s.toString().padStart(2,'0')}s`;
}

// ===== CONTROL =====
playBtn.onclick = ()=>{
    if(!sentences.length) return alert("Chọn file!");

    reading = true;

    silentAudio.play().catch(()=>{});

    startTimer(); // reset timer mỗi lần play

    speak();
};

function stopReading(){
    reading = false;
    synth.cancel();
    silentAudio.pause();

    clearInterval(timerInterval);
    countdown.innerText="";
}

stopBtn.onclick = stopReading;

// đổi thời gian khi đang chạy
timer.onchange = ()=>{
    if(reading){
        startTimer();
    }
};

// UI
rate.oninput=e=>rateVal.innerText=e.target.value;

// fix chạy nền iOS
document.addEventListener("visibilitychange",()=>{
    if(document.hidden && reading){
        silentAudio.play().catch(()=>{});
    }
});

</script>

</body>
</html>
