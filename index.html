<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reader Chapters</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #displayBox { 
            width: 100%; height: 350px; overflow-y: auto; border: 1px solid #ddd; 
            border-radius: 12px; padding: 15px; box-sizing: border-box; background: #fafafa;
            line-height: 1.8; font-size: 19px; margin-bottom: 10px;
        }
        .sentence { cursor: pointer; border-radius: 4px; padding: 2px 0; }
        .highlight { background-color: #ffeb3b !important; font-weight: bold; }
        
        /* Cấu trúc Menu Chương */
        .chapter-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        #chapterSelect { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background: white; }

        .control-group { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-play { background: var(--primary); color: white; }
        .btn-stop { background: #ff3b30; color: white; }
        select, input[type="range"] { width: 100%; margin: 10px 0; }
        
        .hint { font-size: 12px; color: #888; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">Đọc Truyện Phân Chương</h2>
    
    <input type="file" id="fileInput" accept=".txt" style="margin-bottom: 10px; width: 100%;">
    
    <div class="chapter-nav">
        <select id="chapterSelect"><option>Chọn chương...</option></select>
    </div>

    <div class="hint">Chạm vào câu để đọc từ đó. Chuyển chương bằng menu trên.</div>
    <div id="displayBox">Tải file .txt để bắt đầu...</div>

    <div class="control-group">
        <label style="font-size:14px">Tốc độ: <span id="rateVal">1.0</span>x</label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
        <select id="timer">
            <option value="0">Hẹn giờ: Tắt</option>
            <option value="15">Hẹn giờ: 15 phút</option>
            <option value="30">Hẹn giờ: 30 phút</option>
            <option value="60">Hẹn giờ: 60 phút</option>
        </select>
    </div>

    <div class="buttons">
        <button class="btn-play" id="playBtn">Nghe tiếp</button>
        <button class="btn-stop" id="stopBtn">Dừng</button>
    </div>
</div>

<script>
    let synth = window.speechSynthesis;
    let chapters = []; // Lưu nội dung thô từng chương
    let currentSentences = []; // Lưu các câu của chương hiện tại
    let currentChapterIndex = 0;
    let currentSentenceIndex = 0;
    let isReading = false;
    let currentFileName = "";
    let sleepTimer = null;

    const fileInput = document.getElementById('fileInput');
    const displayBox = document.getElementById('displayBox');
    const chapterSelect = document.getElementById('chapterSelect');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const rateInput = document.getElementById('rate');
    const rateVal = document.getElementById('rateVal');

    rateInput.oninput = e => rateVal.innerText = e.target.value;

    fileInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        const reader = new FileReader();
        reader.onload = event => {
            const text = event.target.result;
            splitChapters(text); // 1. Chia chương
            loadSavedPosition(); // 2. Lấy vị trí cũ
        };
        reader.readAsText(file);
    };

    // Hàm nhận diện và chia chương thông minh
    function splitChapters(text) {
        chapterSelect.innerHTML = "";
        // Regex nhận diện "Chương X", "Quyển X", "Mục X", "Chương:", "1."...
        const chapterRegex = /(^\s*(?:Chương|Quyển|Mục|Phần)\s*[\dIVX\-\.]+|^\s*\d+\.\s+.*)/gim;
        
        let match;
        let lastIndex = 0;
        chapters = [];
        let chapterTitles = [];

        // Tách các đoạn nội dung dựa trên tiêu đề chương
        while ((match = chapterRegex.exec(text)) !== null) {
            if (match.index > 0) {
                chapters.push(text.substring(lastIndex, match.index)); // Nội dung chương trước
            }
            chapterTitles.push(match[0].trim()); // Tiêu đề chương này
            lastIndex = match.index;
        }
        chapters.push(text.substring(lastIndex)); // Chương cuối cùng

        // Nếu không tìm thấy chương nào, coi cả file là 1 chương
        if (chapters.length === 0) {
            chapters = [text];
            chapterTitles = ["Nội dung chính"];
        }

        // Cập nhật Menu Chương
        chapterTitles.forEach((title, i) => {
            const option = document.createElement('option');
            option.value = i;
            option.innerText = title.substring(0, 30) + (title.length > 30 ? "..." : ""); // Cắt ngắn tiêu đề quá dài
            chapterSelect.appendChild(option);
        });

        chapterSelect.onchange = e => {
            currentSentenceIndex = 0; // Đổi chương thì đọc từ đầu chương đó
            loadChapter(parseInt(e.target.value));
        };
    }

    function loadSavedPosition() {
        // Lưu vị trí dưới dạng: "indexChương_indexCâu"
        const savedPos = localStorage.getItem("pos_" + currentFileName) || "0_0";
        const parts = savedPos.split("_");
        currentChapterIndex = parseInt(parts[0]) || 0;
        currentSentenceIndex = parseInt(parts[1]) || 0;
        
        chapterSelect.value = currentChapterIndex;
        loadChapter(currentChapterIndex, true); // true = load vị trí câu cũ
    }

    function loadChapter(chapterIndex, useSavedSentencePos = false) {
        stopReading();
        currentChapterIndex = chapterIndex;
        if (!useSavedSentencePos) currentSentenceIndex = 0;

        const chapterText = chapters[chapterIndex];
        // Chia chương thành các câu để highlight
        currentSentences = chapterText.match(/[^.!?\n]+[.!?\n]?/g) || [chapterText];
        currentSentences = currentSentences.map(s => s.trim()).filter(s => s.length > 0);
        
        renderText();
    }

    function renderText() {
        displayBox.innerHTML = '';
        currentSentences.forEach((s, i) => {
            const span = document.createElement('span');
            span.id = `s-${i}`;
            span.className = 'sentence' + (i === currentSentenceIndex ? ' highlight' : '');
            span.innerText = s + ' ';
            span.onclick = () => jumpTo(i); // Chạm để đọc
            displayBox.appendChild(span);
        });
        scrollToActive();
    }

    function jumpTo(sentenceIndex) {
        currentSentenceIndex = sentenceIndex;
        stopReading();
        isReading = true;
        renderText();
        speak();
    }

    function speak() {
        if (currentSentenceIndex >= currentSentences.length) {
            // Đã đọc xong chương, tự động chuyển chương tiếp theo
            if (currentChapterIndex < chapters.length - 1) {
                currentChapterIndex++;
                chapterSelect.value = currentChapterIndex;
                loadChapter(currentChapterIndex);
                isReading = true; // Tiếp tục trạng thái đang đọc
                speak(); 
            } else {
                alert("Đã đọc hết truyện!");
                stopReading();
            }
            return;
        }

        if (!isReading) return;

        synth.cancel();
        let utter = new SpeechSynthesisUtterance(currentSentences[currentSentenceIndex]);
        utter.lang = 'vi-VN';
        utter.rate = parseFloat(rateInput.value);

        utter.onstart = () => {
            document.querySelectorAll('.sentence').forEach(el => el.classList.remove('highlight'));
            document.getElementById(`s-${currentSentenceIndex}`)?.classList.add('highlight');
            scrollToActive();
            // Lưu vị trí: "indexChương_indexCâu"
            localStorage.setItem("pos_" + currentFileName, `${currentChapterIndex}_${currentSentenceIndex}`);
        };

        utter.onend = () => { if (isReading) { currentSentenceIndex++; speak(); } };
        synth.speak(utter);
    }

    function stopReading() { isReading = false; synth.cancel(); clearTimeout(sleepTimer); }
    function scrollToActive() { document.getElementById(`s-${currentSentenceIndex}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }); }

    playBtn.onclick = () => {
        if (chapters.length === 0) return alert("Vui lòng chọn file!");
        isReading = true;
        speak();
    };
    stopBtn.onclick = stopReading;
</script>
</body>
</html>
